name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create the GitHub Release
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
      - run: uv python install 3.12

      - name: Verify the full gate before releasing
        run: |
          uv sync --all-extras --dev
          uv run ruff format --check .
          uv run ruff check .
          uv run mypy
          uv run pytest -m "not live" -q

      - name: Build sdist + wheel
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          # Explicit globs so the build backend's dist/.gitignore is never
          # attached (it would be uploaded as 'default.gitignore').
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true

  pypi:
    # Gated: this job only runs once Trusted Publishing is configured on PyPI and
    # the repo variable PYPI_TRUSTED_PUBLISHER is set to 'configured'. Until then
    # releases still build and attach artifacts to the GitHub Release — no red X.
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/') && vars.PYPI_TRUSTED_PUBLISHER == 'configured' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/agentfence/
    permissions:
      id-token: write # OIDC for PyPI Trusted Publishing — no stored secret
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
